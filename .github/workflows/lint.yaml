name: Lint Charts

on:
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/lint.yaml'
      - 'ct.yaml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      # The chart READMEs are kept in sync by sync-readmes.yaml on push to
      # main — that workflow runs helm-docs and auto-commits any drift back
      # to main. This step here only emits a warning if it finds drift on
      # a PR; it does not fail the job. Authors are still encouraged to run
      # helm-docs locally and include the diff in their PR, but a missed
      # regen on a sibling chart no longer blocks merge.
      - name: Check documentation
        if: steps.list-changed.outputs.changed == 'true'
        continue-on-error: true
        run: |
          # Install helm-docs
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/

          # Check if documentation is up to date
          helm-docs --chart-search-root=charts
          if [ -n "$(git status --porcelain)" ]; then
            echo "::warning::Documentation drift detected. sync-readmes.yaml will auto-fix on merge to main. To pre-empt: run 'helm-docs --chart-search-root=charts' locally and commit."
            git --no-pager diff --stat
          fi
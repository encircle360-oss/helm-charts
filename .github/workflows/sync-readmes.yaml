name: Sync Chart READMEs

# Runs after every push to main. Generates helm-docs across all charts
# and commits any drift back to main, so sibling-chart README updates
# (e.g. from a community-section template change) never accumulate as
# drift that breaks future PR linting.
#
# Why this exists: helm-docs is run against the whole chart-search-root,
# so any change to a shared template re-renders every chart's README. PR
# authors typically only commit the README for the chart they're working
# on, leaving sibling READMEs drifted. This workflow catches the drift
# as soon as the PR lands and keeps main internally consistent.

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/sync-readmes.yaml'

# Limit concurrency so a sequence of merges doesn't have two regen runs
# fighting each other for the same commit on main.
concurrency:
  group: sync-readmes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Use the default GITHUB_TOKEN — sufficient because we only
          # commit back to main on the same repo.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/

      - name: Regenerate READMEs
        run: helm-docs --chart-search-root=charts

      - name: Commit + push drift, if any
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No README drift — nothing to commit."
            exit 0
          fi
          git config user.name "encircle360-oss-bot"
          git config user.email "oss+bot@encircle360.com"
          git add charts/
          git commit -m "docs(charts): regenerate READMEs via helm-docs"
          git push origin main
